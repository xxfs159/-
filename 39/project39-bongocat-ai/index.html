<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>项目39 - 具身 AI 桌面宠物</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="桌面宠物演示区">
        <header class="topbar">
          <div>
            <p class="eyebrow">Project 39 / BongoCat-inspired MVP</p>
            <h1>具身 AI 桌面宠物</h1>
          </div>
          <div class="status-strip" aria-live="polite">
            <span id="presenceChip" class="chip">摄像头未启用</span>
            <span id="moodChip" class="chip accent">待机</span>
          </div>
        </header>

        <div class="workspace">
          <div class="pet-zone">
            <div class="desk-grid" aria-hidden="true"></div>
            <div id="pet" class="pet mood-idle" aria-label="桌面宠物状态动画">
              <div class="pet-shadow"></div>
              <div class="tail"></div>
              <div class="body">
                <div class="chest"></div>
                <div class="paw paw-left"></div>
                <div class="paw paw-right"></div>
              </div>
              <div class="head">
                <div class="ear ear-left"></div>
                <div class="ear ear-right"></div>
                <div class="face">
                  <span class="eye eye-left"></span>
                  <span class="eye eye-right"></span>
                  <span class="nose"></span>
                  <span class="mouth"></span>
                </div>
              </div>
              <div class="thought" id="petThought">我在等你唤醒摄像头或和我聊天。</div>
            </div>

            <div class="input-pad" aria-label="BongoCat 式输入反馈面板">
              <button class="pad-key" data-action="typing" title="模拟键盘输入">K</button>
              <button class="pad-key" data-action="mouse" title="模拟鼠标点击">M</button>
              <button class="pad-key" data-action="cheer" title="触发鼓励动作">A</button>
              <button class="pad-key" data-action="sleep" title="切换休息动作">Z</button>
            </div>
          </div>

          <section class="chat-panel" aria-label="宠物对话">
            <div id="chatLog" class="chat-log" aria-live="polite"></div>
            <form id="chatForm" class="chat-form">
              <input id="chatInput" name="chatInput" autocomplete="off" placeholder="和桌宠说一句话，或问它现在观察到了什么" />
              <button class="send-button" type="submit" title="发送">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12h14M13 5l7 7-7 7" />
                </svg>
              </button>
            </form>
          </section>
        </div>
      </section>

      <aside class="side-panel" aria-label="感知与模型控制">
        <section class="panel camera-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Perception</p>
              <h2>摄像头状态感知</h2>
            </div>
            <button id="cameraButton" class="icon-button" type="button" title="开启摄像头">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 7h3l2-2h4l2 2h3v12H5z" />
                <circle cx="12" cy="13" r="3.5" />
              </svg>
            </button>
          </div>
          <div class="video-frame">
            <video id="cameraVideo" playsinline muted></video>
            <canvas id="analysisCanvas" width="180" height="108" aria-hidden="true"></canvas>
            <div id="cameraPlaceholder" class="placeholder">本地摄像头只在浏览器内分析，不上传画面。</div>
          </div>
          <div class="metrics">
            <div>
              <span>亮度</span>
              <strong id="brightnessValue">--</strong>
            </div>
            <div>
              <span>动作</span>
              <strong id="motionValue">--</strong>
            </div>
            <div>
              <span>人脸</span>
              <strong id="faceValue">--</strong>
            </div>
          </div>
        </section>

        <section class="panel controls-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Action</p>
              <h2>交互能力</h2>
            </div>
          </div>
          <div class="toolbar">
            <button id="micButton" class="icon-button" type="button" title="语音输入">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3z" />
                <path d="M5 11a7 7 0 0 0 14 0M12 18v3" />
              </svg>
            </button>
            <button id="voiceButton" class="icon-button active" type="button" title="语音播报">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 10v4h4l5 4V6L8 10z" />
                <path d="M17 9a4 4 0 0 1 0 6M20 7a7 7 0 0 1 0 10" />
              </svg>
            </button>
            <button id="snapshotButton" class="icon-button" type="button" title="保存当前画面给视觉模型">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="5" width="16" height="14" rx="2" />
                <path d="M8 15l2.5-3 2 2 1.5-1.8L18 16" />
                <circle cx="9" cy="9" r="1.2" />
              </svg>
            </button>
          </div>
          <div class="state-list">
            <p><span>Agent 状态</span><strong id="agentState">观察中</strong></p>
            <p><span>输入反馈</span><strong id="inputCount">0 次</strong></p>
            <p><span>最近动作</span><strong id="lastAction">等待</strong></p>
          </div>
        </section>

        <section class="panel model-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Model</p>
              <h2>可接入大模型</h2>
            </div>
          </div>
          <label>
            <span>OpenAI 兼容接口</span>
            <input id="apiBase" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1" />
          </label>
          <label>
            <span>模型名</span>
            <input id="modelName" placeholder="qwen-vl-plus 或 deepseek-chat" />
          </label>
          <label>
            <span>API Key</span>
            <input id="apiKey" type="password" placeholder="仅保存在本机浏览器" />
          </label>
          <button id="saveModelButton" class="text-button" type="button">保存模型设置</button>
        </section>
      </aside>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
