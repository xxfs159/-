<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 漏洞代码审计助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Project 47</p>
        <h1>AI 漏洞代码审计助手</h1>
      </div>
      <div class="status-pill" id="llmStatus">规则引擎就绪</div>
    </header>

    <main class="workspace">
      <section class="panel input-panel">
        <div class="panel-head">
          <h2>代码输入</h2>
          <button class="ghost-button" id="loadSampleButton" type="button">
            <i data-lucide="file-code-2"></i>
            示例
          </button>
        </div>

        <label class="field-label" for="githubUrl">GitHub 仓库</label>
        <div class="row">
          <input id="githubUrl" type="url" placeholder="https://github.com/owner/repo" />
        </div>

        <div class="divider"><span>或</span></div>

        <label class="drop-zone" for="fileInput">
          <input id="fileInput" type="file" webkitdirectory multiple />
          <span class="drop-title">选择本地代码目录</span>
          <span id="fileCount">未选择文件</span>
        </label>

        <div class="control-row">
          <label class="switch">
            <input id="useLlm" type="checkbox" />
            <span></span>
            <b>启用 DeepSeek/Qwen</b>
          </label>
        </div>

        <button class="primary-button" id="auditButton" type="button">
          <i data-lucide="shield-check"></i>
          开始审计
        </button>

        <p class="message" id="message"></p>
      </section>

      <section class="panel result-panel">
        <div class="panel-head">
          <h2>审计结果</h2>
          <button class="ghost-button" id="copyPatchButton" type="button" disabled>
            <i data-lucide="copy"></i>
            复制补丁
          </button>
        </div>

        <div class="metrics">
          <div>
            <span>风险分</span>
            <strong id="riskScore">0</strong>
          </div>
          <div>
            <span>漏洞数</span>
            <strong id="findingCount">0</strong>
          </div>
          <div>
            <span>可修复</span>
            <strong id="fixableCount">0</strong>
          </div>
          <div>
            <span>文件数</span>
            <strong id="scannedCount">0</strong>
          </div>
        </div>

        <div class="severity-strip">
          <span class="sev critical">Critical <b id="criticalCount">0</b></span>
          <span class="sev high">High <b id="highCount">0</b></span>
          <span class="sev medium">Medium <b id="mediumCount">0</b></span>
          <span class="sev low">Low <b id="lowCount">0</b></span>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="findings" type="button">漏洞</button>
          <button class="tab" data-tab="patch" type="button">PR 补丁</button>
          <button class="tab" data-tab="llm" type="button">AI 分析</button>
        </div>

        <div class="tab-page active" id="findingsTab">
          <div class="finding-list" id="findingList"></div>
        </div>

        <div class="tab-page" id="patchTab">
          <div class="pr-actions">
            <button class="secondary-button" id="createIssueButton" type="button" disabled>
              <i data-lucide="circle-dot"></i>
              提交 Issue
            </button>
            <button class="secondary-button" id="createPrButton" type="button" disabled>
              <i data-lucide="git-pull-request-arrow"></i>
              创建 PR
            </button>
          </div>
          <pre class="diff-view" id="patchView">暂无补丁</pre>
        </div>

        <div class="tab-page" id="llmTab">
          <pre class="llm-view" id="llmView">未启用大模型</pre>
        </div>
      </section>
    </main>
  </body>
</html>
